version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: resume-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: resume_ai
      MYSQL_USER: resume_user
      MYSQL_PASSWORD: resume_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
  chroma:
    image: chromadb/chroma:latest
    container_name: resume-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
volumes:
  mysql_data:
  chroma_data:
